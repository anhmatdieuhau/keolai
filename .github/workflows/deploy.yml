name: Deploy KeoLai to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch: # Trigger thủ công từ GitHub Actions tab

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: keolai-next/package-lock.json

      # ── Auth với GCP bằng Service Account ─────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEOLAI_63EC1 }}

      # ── Build Next.js static site ─────────────────────────────
      - name: Install Next.js dependencies
        run: npm ci
        working-directory: keolai-next

      - name: Build Next.js (static export)
        run: npm run build
        working-directory: keolai-next
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # ── Install Firebase Functions dependencies ────────────────
      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      # ── Install Firebase Tools ─────────────────────────────────
      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      # ── Deploy Hosting ─────────────────────────────────────────
      - name: Deploy Firebase Hosting
        run: firebase deploy --only hosting --project keolai-63ec1 --non-interactive

      # ── Deploy Functions ───────────────────────────────────────
      - name: Deploy Firebase Functions
        run: firebase deploy --only functions --project keolai-63ec1 --non-interactive
